<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/mqtt/dist/mqtt.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<style>
    .boton {
        font-size: 18px; padding: 10px; margin: 5px 0; cursor: pointer;
        background-color: #008CBA; color: white; border: none;
        border-radius: 5px; width: 100%; transition: background-color 0.3s;
    }
    .boton-verde { background-color: #4CAF50 !important; }
    .boton-amarillo { background-color: #FFD700 !important; color: black !important; }
    .boton-rojo { background-color: #f44336 !important; }

    .direction {
        display: grid; grid-template-rows: 100px 100px 100px;
        grid-template-columns: 100px 100px 100px; text-align: center;
        width:fit-content; margin: 20px auto;
    }
    .box {
        background: #444; border: 1px solid #555; display: flex;
        align-items: center; justify-content: center; color: yellowgreen;
        font-size: 18px; margin: 5px; cursor: pointer; border-radius: 8px;
    }
</style>

<body>
    <div class="container mt-3" style="max-width: 500px;">

        <button id="botonConectar" class="boton" onclick="conectarDron()">Conectar con Dron</button>

        <label class="form-label mt-2">Altura de despegue (m):</label>
        <input type="number" id="altura" class="form-control mb-2" placeholder="Ej: 10" value="5">

        <div class="p-2 border rounded bg-light mb-2">
            <label class="form-label">Heading: <span id="headingVal">0</span>°</label>
            <input id="headingRange" type="range" min="0" max="360" value="0" class="form-range" oninput="document.getElementById('headingVal').innerText=this.value;" onchange="cambiarHeading(this.value)">
        </div>

        <button id="botonDespegar" class="boton" onclick="despegarDron()">Despegar</button>
        <button id="botonAterrizar" class="boton" onclick="aterrizarDron()">Aterrizar Dron</button>
        <button id="botonRTL" class="boton" onclick="rtlDron()">RTL (Volver a Casa)</button>

        <div class="direction">
            <div onclick="moverDron('NorthWest')" class="box">NW</div>
            <div onclick="moverDron('North')" class="box">N</div>
            <div onclick="moverDron('NorthEast')" class="box">NE</div>
            <div onclick="moverDron('West')" class="box">W</div>
            <div onclick="moverDron('Stop')" class="box" style="color:red; font-weight:bold;">Stop</div>
            <div onclick="moverDron('East')" class="box">E</div>
            <div onclick="moverDron('SouthWest')" class="box">SW</div>
            <div onclick="moverDron('South')" class="box">S</div>
            <div onclick="moverDron('SouthEast')" class="box">SE</div>
        </div>

        <div id="telemetriaDiv" class="mt-4 p-3 bg-dark text-white rounded text-center">
            <p class="mb-0">Altitud Actual: <span id="altitudValor" class="h2 text-warning">0.00</span> m</p>
            <small id="estadoDron">Estado: Desconectado</small>
        </div>
    </div>

    <script>
        const usuario = "elies"
        var despegueIniciado = false;
        var aterrizajeIniciado = false;
        var rtlIniciado = false;

        const client = mqtt.connect('ws://broker.hivemq.com:8000/mqtt', {
            clean: false,
            keepalive: 60,
            clientId: 'webapp_' + usuario + Math.random().toString(16).substr(2, 8),
        });

        client.on('connect', () => {
            console.log('Conectado');
            client.subscribe('autopilotServiceDemo/' + usuario + '/#');
        });

        client.on('message', (topic, message) => {
            if (topic.includes("telemetryInfo")) {
                try {
                    const data = JSON.parse(message.toString());
                    const alt = data.alt;
                    const estado = data.state;

                    // Actualizar Display de Altura
                    if (alt !== undefined) {
                        document.getElementById("altitudValor").innerText = parseFloat(alt).toFixed(2);
                    }

                    document.getElementById("estadoDron").innerText = "Estado: " + estado;

                    // Lógica de botones según estado
                    if (estado === "flying" && despegueIniciado) {
                        document.getElementById('botonDespegar').classList.replace('boton-amarillo', 'boton-verde');
                        despegueIniciado = false;
                    }
                    if (estado === "landing" && aterrizajeIniciado) {
                        document.getElementById('botonAterrizar').classList.replace('boton-verde','boton-amarillo');
                    }
                    if (estado === "connected" && aterrizajeIniciado) {
                        document.getElementById('botonAterrizar').classList.replace('boton-amarillo', 'boton-verde');
                        aterrizajeIniciado = false;
                    }
                    if (estado === "returning" && rtlIniciado) {
                        document.getElementById('botonRTL').classList.replace('boton-verde', 'boton-amarillo');
                    }
                    if (estado === "connected" && rtlIniciado) {
                        document.getElementById('botonRTL').classList.replace('boton-amarillo', 'boton-verde');
                        rtlIniciado = false;
                    }
                } catch (e) { console.error("Error en telemetría", e); }
            }
        });

        function conectarDron() {
            client.publish(usuario + '/autopilotServiceDemo/connect', "");
            document.getElementById('botonConectar').classList.add('boton-verde');
            client.publish(usuario+'/autopilotServiceDemo/startTelemetry', "");
        }

        function despegarDron() {
            const alturaInput = document.getElementById('altura').value;
            if (alturaInput) {
                // SOLUCIÓN AL PROBLEMA DE LOS 5M:
                // Aseguramos que el valor sea un string numérico limpio
                client.publish(usuario +'/autopilotServiceDemo/arm_takeOff', String(alturaInput));

                despegueIniciado = true;
                document.getElementById('botonDespegar').classList.add('boton-amarillo');
                // Limpiar otros estados
                document.getElementById('botonAterrizar').classList.remove('boton-verde', 'boton-amarillo');
                document.getElementById('botonRTL').classList.remove('boton-verde', 'boton-amarillo');
            }
        }

        function aterrizarDron() {
            client.publish(usuario +'/autopilotServiceDemo/Land', "");
            aterrizajeIniciado = true;
            document.getElementById('botonAterrizar').classList.add('boton-amarillo');
            document.getElementById('botonDespegar').classList.remove('boton-verde', 'boton-amarillo');
        }

        function rtlDron() {
            client.publish(usuario +'/autopilotServiceDemo/RTL', "");
            rtlIniciado = true;
            document.getElementById('botonRTL').classList.add('boton-amarillo');
            document.getElementById('botonDespegar').classList.remove('boton-verde', 'boton-amarillo');
        }

        function moverDron(direction) {
            client.publish(usuario +'/autopilotServiceDemo/go', direction);
        }

        function cambiarHeading(val) {
            // Publicar al topic exacto que espera el servicio
            client.publish(usuario +'/autopilotServiceDemo/changeHeading', String(val));
            document.getElementById('headingVal').innerText = val;
        }
    </script>
</body>
</html>
